name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Run tests
        run: uv run --python "${{ matrix.python-version }}" python -m unittest -v test_mncli.py
      - name: Build package
        run: uv build --clear
